name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast:
    name: Fast gate
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build app executable
        run: swift build --product Lungfish

      - name: Build CLI executable
        run: swift build --product lungfish-cli

      - name: Run smoke package tests
        run: swift test --filter '^(LungfishCoreTests\.(BundleManifestTests|GenomicRegionTests|RuntimeResourceLocatorTests|SequenceTests)|LungfishPluginTests\.PluginRegistryTests|LungfishUITests\.(DisplayModeRegressionTests|ReferenceFrameTests|SidebarItemTests)|LungfishWorkflowTests\.(BAMPrimerTrimProvenanceTests|MappingProvenanceTests))(/|$)'

      - name: Run release and fixture script tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 -B -m unittest discover -s scripts/tests

  full:
    name: Full suite
    runs-on: macos-26
    timeout-minutes: 45
    needs: fast
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run full package tests
        run: swift test
