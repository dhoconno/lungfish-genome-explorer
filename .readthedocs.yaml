version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - libpango1.0-dev
    - libgdk-pixbuf2.0-dev
    - libffi-dev
    - shared-mime-info
  commands:
    - pip install -r docs/requirements.txt
    - ENABLE_PDF_EXPORT=1 mkdocs build -f docs/user-manual/build/mkdocs.yml -d $READTHEDOCS_OUTPUT/html
