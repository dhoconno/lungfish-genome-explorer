version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - libpango1.0-dev
    - libgdk-pixbuf2.0-dev
    - libffi-dev
    - shared-mime-info
    - fonts-inter
  commands:
    - pip install -r docs/requirements.txt
    - mkdir -p ~/.local/share/fonts
    - curl -sL "https://github.com/google/fonts/raw/main/ofl/spacegrotesk/SpaceGrotesk%5Bwght%5D.ttf" -o ~/.local/share/fonts/SpaceGrotesk.ttf
    - curl -sL "https://github.com/google/fonts/raw/main/ofl/ibmplexmono/IBMPlexMono-Regular.ttf" -o ~/.local/share/fonts/IBMPlexMono-Regular.ttf
    - curl -sL "https://github.com/google/fonts/raw/main/ofl/ibmplexmono/IBMPlexMono-Bold.ttf" -o ~/.local/share/fonts/IBMPlexMono-Bold.ttf
    - fc-cache -f ~/.local/share/fonts/
    - ENABLE_PDF_EXPORT=1 mkdocs build -f docs/user-manual/build/mkdocs.yml -d $READTHEDOCS_OUTPUT/html
