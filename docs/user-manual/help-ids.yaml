# help-ids.yaml — maps app surfaces (dialogs, viewports, Inspector sections, menu items)
# to chapter anchors. The Lungfish app uses this file to drive the contextual Help system:
# when the user hovers a UI surface and asks for help, the app reads the help_id, looks
# it up in this file, and opens the documentation at the resolved chapter#anchor.
#
# Schema:
#   <help_id>:
#     chapter: <chapter_id>
#     anchor: <H2 or H3 anchor within the chapter>
#     scope: dialog | viewport | inspector | menu | global
#     description: <one-line description for in-app tooltips>
#
# Anchor IDs use the Markdown convention: lowercase, hyphens for spaces, no punctuation.
# When a chapter does not yet have an explicit `{#anchor}` marker on its H2, the slug is
# derived from the H2 text by the build system. For glossary-term anchors, the format is
# `appendices/glossary#term-slug`.
#
# Owner: Code Cartographer + Documentation Lead.
# This file is read by the app at runtime; chapter authors update it when adding or
# renaming Inspector sections, dialogs, or menu items.

version: 0

# === Foundations cross-references ===
# Every term Lungfish surfaces in a tooltip, dialog, or Inspector resolves through these.

term:reference-genome:
  chapter: appendices/glossary
  anchor: reference-genome
  scope: global
  description: A community-agreed sequence used as the comparison point for samples.

term:fastq:
  chapter: appendices/glossary
  anchor: fastq
  scope: global
  description: Plain-text format for sequencing reads; four lines per read.

term:bam:
  chapter: appendices/glossary
  anchor: bam
  scope: global
  description: Binary alignment file with one row per aligned read.

term:vcf:
  chapter: appendices/glossary
  anchor: vcf
  scope: global
  description: Tab-separated table listing positions where a sample differs from reference.

term:amplicon:
  chapter: appendices/glossary
  anchor: amplicon
  scope: global
  description: PCR-amplified region of a genome; the unit of an amplicon sequencing protocol.

term:primer-scheme:
  chapter: appendices/glossary
  anchor: primer-scheme
  scope: global
  description: The set of primer coordinate pairs that define an amplicon protocol.

term:primer-trim:
  chapter: appendices/glossary
  anchor: primer-trim
  scope: global
  description: Soft-clipping of primer-derived bases off aligned reads in amplicon data.

term:soft-clip:
  chapter: appendices/glossary
  anchor: soft-clip
  scope: global
  description: BAM flag marking read bases present in the record but excluded from pileup.

term:allele-frequency:
  chapter: appendices/glossary
  anchor: allele-frequency
  scope: global
  description: Fraction of reads at a position that carry the alternate base.

term:depth:
  chapter: appendices/glossary
  anchor: depth
  scope: global
  description: Number of reads covering a reference position.

term:phred-score:
  chapter: appendices/glossary
  anchor: phred-score
  scope: global
  description: Logarithmic per-base quality score; Q30 means 0.1% error rate.

term:plugin-pack:
  chapter: appendices/glossary
  anchor: plugin-pack
  scope: global
  description: Themed group of bioinformatics tools installed on demand into conda environments.

term:provenance-sidecar:
  chapter: appendices/glossary
  anchor: provenance-sidecar
  scope: global
  description: JSON file recording how an output was produced.

term:codon:
  chapter: appendices/glossary
  anchor: codon
  scope: global
  description: Run of three consecutive bases encoding one amino acid.

term:strand-bias:
  chapter: appendices/glossary
  anchor: strand-bias
  scope: global
  description: Variant supported predominantly by reads from one strand; often a primer-placement artifact.

term:reference-bundle:
  chapter: appendices/glossary
  anchor: reference-bundle
  scope: global
  description: A .lungfishref folder holding a FASTA, indices, annotations, and tracks.

term:assembly-bundle:
  chapter: appendices/glossary
  anchor: assembly-bundle
  scope: global
  description: A .lungfishref bundle holding a de novo assembly produced inside the project.

term:operations-panel:
  chapter: appendices/glossary
  anchor: operations-panel
  scope: global
  description: Bottom pane of a project window showing every long-running operation.

term:inspector:
  chapter: appendices/glossary
  anchor: inspector
  scope: global
  description: Right-hand pane showing context-sensitive metadata for the selection.

term:sidebar:
  chapter: appendices/glossary
  anchor: sidebar
  scope: global
  description: Left-hand pane showing the project's contents as a folder tree.

term:project:
  chapter: appendices/glossary
  anchor: project
  scope: global
  description: A folder on disk holding one Lungfish analysis.

