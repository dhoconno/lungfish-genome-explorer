# features.yaml, Lungfish feature inventory.
# Ownership: Code Cartographer only.
# Schema:
#   <feature_id>:
#     title: <human name>
#     entry_points: [<UI path or CLI command>, ...]
#     inputs: [<file format or data type>, ...]
#     outputs: [<file format or data type>, ...]
#     viewport_class: sequence | alignment | variant | assembly | taxonomy | none
#     sources: [<Sources/ path>, ...]
#     notes: <free text>

version: 0
features:
  import.vcf:
    title: Import VCF
    entry_points:
      - "File > Open (filter: VCF)"
      - "Import Center > Variants"
      - "CLI: lungfish import vcf"
    inputs: [vcf, vcf.gz]
    outputs: [variant-browser-dataset]
    viewport_class: variant
    sources:
      - Sources/LungfishIO/Formats/VCF/VCFReader.swift
      - Sources/LungfishIO/Formats/VCF/VCFReferenceInference.swift
      - Sources/LungfishApp/App/VCFImportHelper.swift
      - Sources/LungfishApp/App/VCFAutoIngestor.swift
      - Sources/LungfishCLI/Commands/ImportCommand.swift
    notes: >-
      Accepts plain text VCF and bgzipped VCF with accompanying tabix index.
      Inference picks a compatible reference by chromosome set, applying
      RefSeq, UCSC, and Ensembl alias mappings so that a VCF carrying
      MT192765.1 or NC_045512.2 or chrCOV19 resolves to the same reference
      when present in the project.
  viewport.variant-browser:
    title: Variant browser viewport
    entry_points:
      - "Open a VCF dataset from the sidebar"
    inputs: [variant-browser-dataset]
    outputs: []
    viewport_class: variant
    sources:
      - Sources/LungfishApp/Views/Viewer/VCFDatasetViewController.swift
      - Sources/LungfishApp/Views/Viewer/VariantTrackRenderer.swift
      - Sources/LungfishApp/Views/Inspector/Sections/VariantSection.swift
      - Sources/LungfishCore/Models/VariantTrack.swift
      - Sources/LungfishIO/Bundles/VariantDatabase.swift
    notes: >-
      Presents variants as a sortable table with CHROM, POS, ID, REF, ALT,
      QUAL, FILTER, GT, and AF columns. Selecting a row centers the genome
      context pane on that coordinate. The Inspector surfaces the full INFO
      and FORMAT payload for the selected record.
  fetch.ncbi:
    title: Download a reference sequence from NCBI
    entry_points:
      - "Tools > Search Online Databases > Search NCBI/SRA..."
      - "CLI: lungfish fetch ncbi"
    inputs: [ncbi-accession]
    outputs: [fasta, genbank, provenance-sidecar]
    viewport_class: none
    sources:
      - Sources/LungfishCLI/Commands/FetchCommand.swift
      - Sources/LungfishApp/Views/DatabaseBrowser/DatabaseSearchDialog.swift
      - Sources/LungfishApp/Views/DatabaseBrowser/GenBankGenomesSearchPane.swift
      - Sources/LungfishApp/ViewModels/GenomeDownloadViewModel.swift
      - Sources/LungfishApp/Services/DownloadCenter.swift
    notes: >-
      Downloads one or more NCBI records through the CLI or database search UI.
      Saved CLI files write a file-specific Lungfish provenance sidecar with
      the resolved fetch options, endpoint, pseudo-input accession, output
      checksum, size, and command line.
  fetch.sra:
    title: Download FASTQ reads from SRA
    entry_points:
      - "Tools > Search Online Databases > Search NCBI/SRA..."
      - "CLI: lungfish fetch sra download"
    inputs: [sra-run-accession]
    outputs: [fastq, fastq.gz, provenance-sidecar]
    viewport_class: none
    sources:
      - Sources/LungfishCLI/Commands/FetchCommand.swift
      - Sources/LungfishApp/Views/DatabaseBrowser/DatabaseSearchDialog.swift
      - Sources/LungfishApp/Views/DatabaseBrowser/SRARunsSearchPane.swift
      - Sources/LungfishApp/Views/FASTQ/FASTQImportConfigSheet.swift
      - Sources/LungfishApp/Services/DownloadCenter.swift
      - Sources/LungfishWorkflow/Provenance/ProvenanceRecorder.swift
    notes: >-
      Downloads SRA reads through ENA or SRA Toolkit fallback paths and records
      the downloader, options, produced FASTQ files, checksums, sizes, and
      runtime details in the output directory provenance sidecar.
  map:
    title: Map reads to a reference
    entry_points:
      - "Tools > Map Reads..."
      - "CLI: lungfish map"
      - "CLI: lungfish bam adopt-mapping"
    inputs: [fastq, fasta, reference-bundle]
    outputs: [bam, bai, mapping-result, alignment-track, mapping-provenance]
    viewport_class: alignment
    sources:
      - Sources/LungfishCLI/Commands/MapCommand.swift
      - Sources/LungfishCLI/Commands/BAMAdoptMappingSubcommand.swift
      - Sources/LungfishApp/Views/Mapping/MappingWizardSheet.swift
      - Sources/LungfishApp/Services/MappingViewerBundlePreparer.swift
      - Sources/LungfishWorkflow/Mapping/ManagedMappingPipeline.swift
      - Sources/LungfishWorkflow/Mapping/MappingResult.swift
      - Sources/LungfishWorkflow/Mapping/MappingProvenance.swift
    notes: >-
      Runs minimap2 or the selected mapper, normalizes the resulting BAM, writes
      a mapping-result sidecar, and can attach the mapping outputs to a
      reference bundle with `lungfish bam adopt-mapping`.
  variants.call:
    title: Call variants from a bundle alignment track
    entry_points:
      - "Tools > Call Variants…"
      - "Inspector > Analysis > Call Variants…"
      - "CLI: lungfish variants call"
    inputs: [reference-bundle, bundle-alignment-track]
    outputs: [vcf.gz, tbi, variant-track, variant-sqlite-db]
    viewport_class: variant
    sources:
      - Sources/LungfishApp/Views/BAM/BAMVariantCallingDialog.swift
      - Sources/LungfishApp/Views/BAM/BAMVariantCallingDialogState.swift
      - Sources/LungfishApp/Views/BAM/BAMVariantCallingDialogPresenter.swift
      - Sources/LungfishApp/Views/BAM/BAMVariantCallingCatalog.swift
      - Sources/LungfishApp/Views/BAM/BAMVariantCallingEligibility.swift
      - Sources/LungfishApp/Views/BAM/BAMVariantCallingToolPanes.swift
      - Sources/LungfishApp/Views/Inspector/InspectorViewController.swift
      - Sources/LungfishApp/Services/CLIVariantCallingRunner.swift
      - Sources/LungfishWorkflow/Variants/ViralVariantCallingPipeline.swift
      - Sources/LungfishWorkflow/Variants/BAMVariantCallingPreflight.swift
      - Sources/LungfishWorkflow/Variants/BundleVariantCallingModels.swift
      - Sources/LungfishWorkflow/Variants/BundleVariantTrackAttachmentService.swift
      - Sources/LungfishWorkflow/Variants/VariantSQLiteImportCoordinator.swift
      - Sources/LungfishCLI/Commands/VariantsCommand.swift
    notes: >-
      Runs LoFreq, iVar, Medaka, or bcftools against a bundle-owned BAM alignment
      track, normalizes the resulting VCF, imports it into the bundle
      SQLite variant store, and attaches a new variant track. The iVar
      caller requires the user to confirm the BAM was primer-trimmed; the
      Medaka caller requires an ONT basecaller model identifier. The
      bcftools caller runs `mpileup` into `call` and records both native
      tool stages in provenance.
  bam.primer-trim:
    title: Primer-trim a BAM with iVar
    entry_points:
      - "Inspector > Analysis > Primer-trim BAM…"
      - "CLI: lungfish bam primer-trim"
    inputs: [reference-bundle, bundle-alignment-track, lungfishprimers]
    outputs: [bam, bai, alignment-track, primer-trim-provenance]
    viewport_class: alignment
    sources:
      - Sources/LungfishApp/Views/BAM/BAMPrimerTrimDialog.swift
      - Sources/LungfishApp/Views/BAM/BAMPrimerTrimDialogState.swift
      - Sources/LungfishApp/Views/BAM/BAMPrimerTrimDialogPresenter.swift
      - Sources/LungfishApp/Views/BAM/BAMPrimerTrimCatalog.swift
      - Sources/LungfishApp/Views/BAM/BAMPrimerTrimToolPanes.swift
      - Sources/LungfishApp/Views/BAM/PrimerSchemePickerView.swift
      - Sources/LungfishApp/Views/Inspector/InspectorViewController.swift
      - Sources/LungfishApp/Services/CLIPrimerTrimRunner.swift
      - Sources/LungfishWorkflow/Primers/BAMPrimerTrimPipeline.swift
      - Sources/LungfishWorkflow/Primers/BAMPrimerTrimRequest.swift
      - Sources/LungfishWorkflow/Primers/BAMPrimerTrimResult.swift
      - Sources/LungfishWorkflow/Primers/BAMPrimerTrimProvenance.swift
      - Sources/LungfishWorkflow/Primers/PrimerSchemeResolver.swift
      - Sources/LungfishWorkflow/Primers/PrimerTrimProvenanceLoader.swift
      - Sources/LungfishIO/Bundles/PrimerSchemeBundle.swift
      - Sources/LungfishIO/Bundles/PrimerSchemesFolder.swift
      - Sources/LungfishCLI/Commands/BAMCommand.swift
      - Sources/LungfishCLI/Commands/BAMPrimerTrimSubcommand.swift
    notes: >-
      Runs `ivar trim` against a bundle-owned BAM alignment track using a
      .lungfishprimers scheme bundle, sorts and indexes the result, and
      attaches a new primer-trimmed alignment track to the bundle with
      provenance JSON capturing resolved options, command line, runtime
      identity, input and output file records, per-step commands, exit status,
      stderr when available, checksums, sizes, and wall time.
