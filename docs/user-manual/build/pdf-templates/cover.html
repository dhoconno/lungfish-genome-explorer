<article id="doc-cover">
    <div class="wrapper"></div>
    <div class="wrapper">
        <h1>{{ cover_title | e }}</h1>
        <h2>{{ cover_subtitle | e }}</h2>
    </div>
    <div class="properties">
        <address>
            {% if author is defined %}
                <p id="author">{{ author | e }}</p>
            {% endif %}
            <p>lungfish.readthedocs.io</p>
        </address>
    </div>
</article>
