site_name: Lungfish User Manual
site_description: Documentation for Lungfish, the macOS app for viral genome analysis.
site_url: https://lungfish.readthedocs.io/
docs_dir: ../
site_dir: ../../../.docs-site/user-manual/
exclude_docs: |
  build/
  reviews/
  fixtures/
  overrides/

theme:
  name: material
  custom_dir: ../overrides
  font:
    text: Inter
    code: IBM Plex Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - with-pdf:
      author: Lungfish Development Team
      cover_title: Lungfish User Manual
      cover_subtitle: Documentation for the macOS app for viral genome analysis
      output_path: pdf/lungfish-user-manual.pdf
      custom_template_path: docs/user-manual/build/pdf-templates
      toc_level: 3
      cover: true
      toc_title: Table of Contents
      debug_html: true
      verbose: true
      enabled_if_env: ENABLE_PDF_EXPORT

extra_css:
  - css/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md

  - Foundations:
    - What Is a Genome: chapters/01-foundations/01-what-is-a-genome.md
    - Sequencing Reads: chapters/01-foundations/02-sequencing-reads.md
