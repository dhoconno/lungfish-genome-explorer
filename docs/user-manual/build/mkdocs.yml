    - Alignment Files: chapters/01-foundations/04-alignment-files.md
    - Variants and VCF Files: chapters/01-foundations/05-variants-and-vcf.md
    - The Lungfish Project: chapters/01-foundations/06-the-lungfish-project.md
    - Plugin Packs: chapters/01-foundations/07-plugin-packs.md
    - Provenance and Reproducibility: chapters/01-foundations/08-provenance-and-reproducibility.md
    - Shared Projects: chapters/01-foundations/09-shared-projects.md

  - Sequences:
